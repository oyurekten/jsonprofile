[project]
name = "pymztab-m-iaaiaaspdr"
version = "0.1.0"
description="The Python3 language bindings for mzTab-M"
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "pydantic>=2.10.6",
    "pyyaml>=6.0.3",
]
[dependency-groups]
dev = [
    "pytest>=8.3.5",
    "ruff>=0.14.4",
    "uv-build>=0.9.8",
]

[tool.ruff.lint]
select = ["E", "F", "W", "N", "C90"]
ignore = ["E501", "C901"]

[tool.pytest.ini_options]
addopts = "-v"
testpaths = ["tests"]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["mztab_m_io*"]
exclude = ["tests*", "docs*", "scripts*"]

[tool.setuptools.package-data]
"mztab_m_io" = ["**/*.json"]
