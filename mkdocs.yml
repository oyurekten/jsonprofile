site_name: mzTab-M Python Implementation
site_url: https://github.com/lifs-tools/pymzTab-m
theme:
  name: material
  logo: assets/repo.png
  favicon: assets/favicon.png
  features:
  - content.code.annotate
  - content.code.copy
  # - content.code.select
  - content.footnote.tooltips
  - content.tabs.link
  - content.tooltips
  - navigation.footer
  - navigation.indexes
  - navigation.instant
  - navigation.instant.prefetch
  # - navigation.instant.preview
  - navigation.instant.progress
  - navigation.path
  - navigation.tabs
  - navigation.tabs.sticky
  - navigation.top
  - navigation.tracking
  - search.highlight
  - search.share
  - search.suggest
  - toc.follow
  - toc.integrate
  nav_depth: 3
extra_css:
- stylesheets/extra.css
nav:
- index.md
- Model:
  - MzTabM: model/MzTabM.md
  - Assay: model/Assay.md
  - CV: model/CV.md
  - ColumnParameterMapping: model/ColumnParameterMapping.md
  - Comment: model/Comment.md
  - Contact: model/Contact.md
  - Database: model/Database.md
  - Instrument: model/Instrument.md
  - Metadata: model/Metadata.md
  - MsRun: model/MsRun.md
  - OptColumnMapping: model/OptColumnMapping.md
  - Parameter: model/Parameter.md
  - Publication: model/Publication.md
  - PublicationItem: model/PublicationItem.md
  - Sample: model/Sample.md
  - SampleProcessing: model/SampleProcessing.md
  - SmallMoleculeEvidence: model/SmallMoleculeEvidence.md
  - SmallMoleculeFeature: model/SmallMoleculeFeature.md
  - SmallMoleculeSummary: model/SmallMoleculeSummary.md
  - Software: model/Software.md
  - SpectraRef: model/SpectraRef.md
  - StudyVariable: model/StudyVariable.md
  - Uri: model/Uri.md
plugins:
- search

markdown_extensions:
# Python Markdown
- abbr:
- attr_list:
- footnotes:
- md_in_html:
- tables:
- admonition:
- def_list:
- toc:
    permalink: true
  # Python Markdown Extensions
- pymdownx.tasklist:
    custom_checkbox: true
- pymdownx.highlight:
    anchor_linenums: true
    line_spans: __span
    pygments_lang_class: true
    use_pygments: true
    linenums: false
    linenums_style: pymdownx-inline
- pymdownx.inlinehilite:
- pymdownx.snippets:
    base_path: [ "mztab_m_io", "docs" ]
    check_paths: true
- pymdownx.betterem:
- pymdownx.caret:
- pymdownx.inlinehilite:
- pymdownx.keys:
- pymdownx.mark:
- pymdownx.tilde:

    # pymdownx blocks
- pymdownx.blocks.admonition:
    types:
    - note
    - attention
    - caution
    - danger
    - error
    - tip
    - hint
    - warning
    # Custom types
    - info
    - check
    - example
    - success
- pymdownx.blocks.details:
- pymdownx.blocks.tab:
    alternate_style: True
