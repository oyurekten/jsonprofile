  sample_processing:
  - id: 1
    sample_processing:
    - cv_accession: EFO:0005518
      cv_label: EFO
      id: 1
      name: sample collection protocol
      value: "\"Blood samples for metabolomic analysis were taken from vein into a 5 ml heparin tube (Terumo). Immediately, 0.2 ml blood were quenched in 1.8 ml -40 °C 55% methanol.\""
  - id: 2
    sample_processing:
    - cv_accession: MS:1000831
      cv_label: MS
      id: 1
      name: sample preparation
      value: "\"A constant amount of two internal standards (10 nmol of HEPES, 4-(2-hydroxyethyl)-1-piperazineethanesulfonic acid, and PIPES, piperazine-N,N′-bis(2-ethanesulfonic acid) was added to each sample. After brief vortexing, samples were transferred to Amicon Ultra 10-kDa cut-off filter (Millipore, Billerica, MA, USA) to remove proteins and cell debris. Following sample concentration by vacuum evaporation, each sample was resuspended in 40 μl of 50% acetonitrile and 1 μl (equivalent to 5 μl of initial sample) was used for each injection into the LC-MS system.\""
  - id: 3
    sample_processing:
    - cv_accession: CHMO:0001000
      cv_label: CHMO
      id: 1
      name: chromatography
      value: "\"LC-MS data were obtained using a Paradigm MS4 HPLC system (Michrom Bioresources, Auburn, CA, USA) coupled to an LTQ Orbitrap mass spectrometer (Thermo Fisher Scientific, Waltham, MA, USA), as described previously[1]. Briefly, metabolites were separated on a ZIC-pHILIC column (Merck SeQuant, Sweden; 150 x 2.1 mm, 5 µm particle size) using acetonitrile (A) and 10 mM ammonium carbonate buffer, pH 9.3 (B) as the mobile phase, with gradient elution from 80% A to 20% A in 30 min, at a flow rate of 100 µl/min. Sample injection volume was 1 µl per run. </p> Ref:</br> [1] Pluskal T, Nakamura T, Villar-Briones A, Yanagida M (2010) Metabolic profiling of the fission yeast S. pombe: quantification of compounds under different temperatures and genetic perturbation. Mol Biosyst 6:182–198. doi: 10.1039/b908784b PMID:20024080</br>\""
  - id: 4
    sample_processing:
    - cv_accession: CHMO:0000470
      cv_label: CHMO
      id: 1
      name: mass spectrometry
      value: '"The LTQ Orbitrap mass spectrometer (Thermo Fisher Scientific, Waltham, MA, USA) was operated in full scan mode with the scan range of 100-1,000 m/z. Each sample was analyzed twice, once in negative and once in positive ionization mode."'
  - id: 5
    sample_processing:
    - cv_accession: OBI:0200000
      cv_label: OBI
      id: 1
      name: data transform
      value: '"Peak areas of metabolites of interest, within the raw LC-MS data, were measured using the MZmine 2.10 software and normalized using the peak areas of HEPES and PIPES. The complete workflow and processing parameters are summarized in the publication."'
  - id: 6
    sample_processing:
    - cv_accession: MI:2131
      cv_label: MI
      id: 1
      name: metabolite identification
      value: '"Metabolites were identified by comparing their m/z values and retention times with authentic pure standards. If no standard was available, metabolites were assigned by analysis of MS/MS spectra (MS/MS), as described in the publication. In cases where no standard compound or MS/MS spectrum was available, compounds were identified by generating chemical formulae using m/z values in MZmine 2.10 module and given MS status."'
